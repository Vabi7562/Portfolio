<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="90" fill="#0A0A0A"/>

  <!-- Diamond: rounded-corner square rotated 45° -->
  <rect x="86" y="86" width="340" height="340" rx="108" ry="108"
    transform="rotate(45 256 256)"
    fill="none" stroke="#F0EBE0" stroke-width="44" stroke-linejoin="round"/>

  <!-- S letter -->
  <path d="M236,176 C236,146 134,146 134,198 C134,248 236,250 236,300 C236,352 134,352 134,322"
    fill="none" stroke="#F0EBE0" stroke-width="44" stroke-linecap="round"/>

  <!-- V letter -->
  <path d="M258,176 L320,336 L382,176"
    fill="none" stroke="#F0EBE0" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
