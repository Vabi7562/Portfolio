<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0A0A0A"/>

  <!-- Diamond outline (rotated square) — thick enough to read at 16px -->
  <rect
    x="5" y="5" width="22" height="22" rx="4"
    transform="rotate(45 16 16)"
    fill="none" stroke="#F4C96A" stroke-width="2.2"
    stroke-linejoin="round"/>

  <!-- S -->
  <path
    d="M11 11.5 C11 10 9 10 9 11.5 C9 13 11 13 11 14.5 C11 16 9 16 9 14.8"
    fill="none" stroke="#F0EBE0" stroke-width="1.6" stroke-linecap="round"/>

  <!-- V -->
  <path
    d="M13 10.5 L15.5 16 L18 10.5"
    fill="none" stroke="#F0EBE0" stroke-width="1.6"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
